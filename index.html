<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任務系統 V8</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e6f4ff,#d9efff);
padding:15px;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.card{
background:rgba(255,255,255,0.7);
padding:15px;
border-radius:15px;
margin-bottom:12px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:#8ec9ff;
font-weight:bold;
}

img{width:100%;border-radius:10px;margin-top:10px;}

.hidden{display:none;}
.robux{color:green;font-weight:bold;}
</style>
</head>

<body>

<div class="title">📋 任務系統 V8</div>

<div class="card">
<button onclick="showLogin()">🔐 管理員</button>

<div id="loginBox" class="hidden">
<input id="pw" type="password" placeholder="密碼">
<button onclick="login()">登入</button>
</div>
</div>

<div id="admin" class="card hidden">

<h3>新增 / 編輯任務</h3>

<input id="title" placeholder="標題">
<input id="id" placeholder="ID">
<textarea id="desc" placeholder="說明"></textarea>
<textarea id="example" placeholder="範例"></textarea>
<input id="robux" placeholder="Robux">
<input type="file" id="img">

<button onclick="submitTask()">送出</button>

</div>

<input onkeyup="search()" class="search" placeholder="搜尋任務...">

<div id="list"></div>

<script>

const repo="你的帳號/你的repo"

let tasks=[]
let editIndex=null

async function load(){
const res=await fetch(`https://api.github.com/repos/${repo}/contents/tasks.json`)
const data=await res.json()
tasks=JSON.parse(atob(data.content))
render()
}

function showLogin(){
document.getElementById("loginBox").classList.toggle("hidden")
}

function login(){
if(pw.value==="1234"){
admin.classList.remove("hidden")
alert("登入成功")
}else alert("錯誤")
}

function render(){
list.innerHTML=tasks.map((t,i)=>`
<div class="card">
<h3>${t.title}</h3>
<div>ID:${t.id}</div>
<div>${t.desc}</div>
<div>${t.example}</div>
<div class="robux">💰 ${t.robux}</div>
${t.image?`<img src="${t.image}">`:""}

<button onclick="edit(${i})">✏ 編輯</button>
<button onclick="del(${i})">🗑 刪除</button>
</div>
`).join("")
}

function search(){
let v=document.querySelector(".search").value.toLowerCase()
let f=tasks.filter(t=>t.title.toLowerCase().includes(v)||t.id.toLowerCase().includes(v))
list.innerHTML=f.map((t,i)=>`
<div class="card">
<h3>${t.title}</h3>
<div>ID:${t.id}</div>
<div>${t.desc}</div>
<div>${t.example}</div>
<div class="robux">💰 ${t.robux}</div>
${t.image?`<img src="${t.image}">`:""}
<button onclick="edit(${i})">✏ 編輯</button>
<button onclick="del(${i})">🗑 刪除</button>
</div>
`).join("")
}

function edit(i){
let t=tasks[i]
title.value=t.title
id.value=t.id
desc.value=t.desc
example.value=t.example
robux.value=t.robux
editIndex=i
alert("已載入")
}

async function del(i){
if(!confirm("刪除？"))return
tasks.splice(i,1)
await save()
}

async function submitTask(){

let file=img.files[0]
let reader=new FileReader()

reader.onload=async function(){

let obj={
title:title.value,
id:id.value,
desc:desc.value,
example:example.value,
robux:robux.value,
image:reader.result||null
}

if(editIndex!==null){
tasks[editIndex]=obj
editIndex=null
}else{
tasks.push(obj)
}

await save()
load()
}

if(file) reader.readAsDataURL(file)
else reader.onload()

}

async function save(){

await fetch(`https://api.github.com/repos/${repo}/dispatches`,{
method:"POST",
headers:{
"Accept":"application/vnd.github+json"
},
body:JSON.stringify({
event_type:"update",
client_payload:{tasks}
})
})

}

load()

</script>

</body>
</html>
