<!DOCTYPE html>


<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>任務查詢系統</title>


<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:20px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
}

h1{
text-align:center;
color:white;
}

.search{
width:100%;
padding:12px;
border-radius:15px;
border:none;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.25);
backdrop-filter: blur(10px);
padding:15px;
border-radius:20px;
margin-bottom:15px;
color:white;
transition:0.2s;
cursor:pointer;
}

.card:active{
transform:scale(0.97);
}

.robux{
font-weight:bold;
color:#00ffae;
font-size:18px;
}

.card img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.admin{
background:rgba(255,255,255,0.25);
backdrop-filter: blur(10px);
padding:15px;
border-radius:20px;
margin-bottom:20px;
color:white;
}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:white;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(0.95);
}

.login{
text-align:center;
margin-bottom:20px;
}

</style>


</head>


<body>


<h1>📋 任務查詢系統</h1>


<div class="login">


<input type="password" placeholder="管理員密碼" id="password">


管理員登入

</div>


<div id="adminPanel" style="display:none" class="admin">


<h3>新增任務</h3>


<input id="title" placeholder="標題">
<input id="id" placeholder="任務ID">
<textarea id="desc" placeholder="說明"></textarea>
<textarea id="example" placeholder="舉例"></textarea>
<input id="robux" placeholder="Robux">
<input type="file" id="image">


新增任務

</div>


<input class="search" placeholder="搜尋任務..." onkeyup="searchTask()">


<div id="tasks"></div>


<script>

let adminPassword = "1234"

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function login(){

let pass = document.getElementById("password").value

if(pass === adminPassword){
document.getElementById("adminPanel").style.display="block"
alert("管理員登入成功")
}else{
alert("密碼錯誤")
}

}

function addTask(){

let title = document.getElementById("title").value
let id = document.getElementById("id").value
let desc = document.getElementById("desc").value
let example = document.getElementById("example").value
let robux = document.getElementById("robux").value
let image = document.getElementById("image").files[0]

let reader = new FileReader()

reader.onload = function(){

tasks.push({
title,
id,
desc,
example,
robux,
image:reader.result
})

localStorage.setItem("tasks",JSON.stringify(tasks))

render()

}

if(image){
reader.readAsDataURL(image)
}else{
reader.onload()
}

}

function render(){

let html=""

tasks.forEach(task=>{

html+=`

<div class="card" onclick="clickEffect(this)">

<h2>${task.title}</h2>

<p>任務ID：${task.id}</p>
<p>${task.desc}</p>
<p>舉例：${task.example}</p>

<div class="robux">💰 ${task.robux} Robux</div>

${task.image ? `<img src="${task.image}">` : ""}

</div>

`

})

document.getElementById("tasks").innerHTML=html

}

function searchTask(){

let input=document.querySelector(".search").value.toLowerCase()

let filtered=tasks.filter(task=>

task.title.toLowerCase().includes(input) ||
task.id.toLowerCase().includes(input)

)

let html=""

filtered.forEach(task=>{

html+=`

<div class="card">

<h2>${task.title}</h2>

<p>任務ID：${task.id}</p>
<p>${task.desc}</p>
<p>舉例：${task.example}</p>

<div class="robux">💰 ${task.robux} Robux</div>

${task.image ? `<img src="${task.image}">` : ""}

</div>

`

})

document.getElementById("tasks").innerHTML=html

}

function clickEffect(el){

el.style.transform="scale(0.96)"

setTimeout(()=>{
el.style.transform="scale(1)"
},150)

}

render()

</script>


</body>
</html>
