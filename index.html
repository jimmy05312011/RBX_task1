<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任務查詢系統</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e6f4ff,#d9efff);
min-height:100vh;
padding:15px;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.card{
background:rgba(255,255,255,0.65);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
margin-bottom:15px;
}

.search{
width:100%;
padding:12px;
border-radius:15px;
border:none;
margin-bottom:15px;
}

.robux{
color:#00a86b;
font-weight:bold;
margin-top:5px;
}

img{
width:100%;
border-radius:12px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin-top:8px;
background:#8ec9ff;
font-weight:bold;
}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="title">📋 任務查詢系統</div>

<div class="card">
<button onclick="showLogin()">🔐 管理員登入</button>

<div id="loginBox" class="hidden">
<input type="password" id="password" placeholder="輸入密碼">
<button onclick="login()">登入</button>
</div>
</div>

<div id="adminPanel" class="card hidden">

<h3>新增 / 編輯任務</h3>

<input id="title" placeholder="標題">
<input id="id" placeholder="任務ID">
<textarea id="desc" placeholder="說明"></textarea>
<textarea id="example" placeholder="舉例"></textarea>
<input id="robux" placeholder="Robux">
<input type="file" id="image">

<button onclick="addTask()">送出</button>

</div>

<input class="search" placeholder="搜尋任務..." onkeyup="searchTask()">

<div id="tasks"></div>

<script>

const repo="你的帳號/你的repo"
const token="你的GitHubToken"

let tasks=[]
let editIndex=null

async function loadTasks(){
const res=await fetch(`https://api.github.com/repos/${repo}/contents/tasks.json`)
const data=await res.json()
tasks=JSON.parse(atob(data.content))
render()
}

function showLogin(){
document.getElementById("loginBox").classList.toggle("hidden")
}

function login(){
let pass=document.getElementById("password").value
if(pass==="1234"){
document.getElementById("adminPanel").classList.remove("hidden")
alert("登入成功")
}else{
alert("錯誤")
}
}

function render(){
let html=""
tasks.forEach((t,i)=>{
html+=`
<div class="card">
<h3>${t.title}</h3>
<div>ID：${t.id}</div>
<div>${t.desc}</div>
<div>${t.example}</div>
<div class="robux">💰 ${t.robux}</div>

${t.image?`<img src="${t.image}">`:""}

<button onclick="editTask(${i})">✏ 編輯</button>
<button onclick="deleteTask(${i})">🗑 刪除</button>

</div>`
})
document.getElementById("tasks").innerHTML=html
}

function searchTask(){
let v=document.querySelector(".search").value.toLowerCase()

let f=tasks.filter(t=>
t.title.toLowerCase().includes(v)||
t.id.toLowerCase().includes(v)
)

document.getElementById("tasks").innerHTML=f.map((t,i)=>`
<div class="card">
<h3>${t.title}</h3>
<div>ID：${t.id}</div>
<div>${t.desc}</div>
<div>${t.example}</div>
<div class="robux">💰 ${t.robux}</div>
${t.image?`<img src="${t.image}">`:""}
<button onclick="editTask(${i})">✏ 編輯</button>
<button onclick="deleteTask(${i})">🗑 刪除</button>
</div>
`).join("")
}

function editTask(i){
let t=tasks[i]
title.value=t.title
id.value=t.id
desc.value=t.desc
example.value=t.example
robux.value=t.robux
editIndex=i
alert("已載入編輯")
}

async function deleteTask(i){
if(!confirm("刪除？"))return
tasks.splice(i,1)
await save()
}

async function addTask(){

let reader=new FileReader()
let file=document.getElementById("image").files[0]

reader.onload=async function(){

let obj={
title:title.value,
id:id.value,
desc:desc.value,
example:example.value,
robux:robux.value,
image:reader.result||null
}

if(editIndex!==null){
tasks[editIndex]=obj
editIndex=null
}else{
tasks.push(obj)
}

await save()
alert("完成")
loadTasks()
}

if(file) reader.readAsDataURL(file)
else reader.onload()

}

async function save(){

await fetch(`https://api.github.com/repos/${repo}/dispatches`,{
method:"POST",
headers:{
"Authorization":"Bearer "+token,
"Accept":"application/vnd.github+json"
},
body:JSON.stringify({
event_type:"update",
client_payload:{
tasks:tasks
}
})
})

}

loadTasks()

</script>

</body>
</html>
