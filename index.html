<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任務查詢系統</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e6f4ff,#d9efff);
min-height:100vh;
padding:15px;
}

.title{font-size:24px;font-weight:bold;margin-bottom:15px;}

.card{
background:rgba(255,255,255,0.65);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.search{
width:100%;
padding:12px;
border-radius:15px;
border:none;
margin-bottom:15px;
}

.robux{color:#00a86b;font-weight:bold;margin-top:5px;}

img{width:100%;border-radius:12px;margin-top:10px;}

button{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin-top:8px;
background:#8ec9ff;
font-weight:bold;
}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="title">📋 任務查詢系統</div>

<div class="card">
<button onclick="showLogin()">🔐 管理員登入</button>

<div id="loginBox" class="hidden">
<input type="password" id="password" placeholder="密碼">
<button onclick="login()">登入</button>
</div>
</div>

<div id="adminPanel" class="card hidden">

<h3>新增 / 編輯任務</h3>

<input id="title" placeholder="標題">
<input id="id" placeholder="任務ID">
<textarea id="desc" placeholder="說明"></textarea>
<textarea id="example" placeholder="舉例"></textarea>
<input id="robux" placeholder="Robux">
<input type="file" id="image">

<button onclick="addTask()">送出</button>

</div>

<input class="search" placeholder="搜尋..." onkeyup="searchTask()">

<div id="tasks"></div>

<script>

const repo="jimmy05312011/RBX_task1"
let adminPassword="1234"
let tasks=[]
window.editIndex=undefined

async function loadTasks(){
const res=await fetch(`https://api.github.com/repos/${repo}/contents/tasks.json`)
const data=await res.json()
tasks=JSON.parse(atob(data.content))
render()
}

function showLogin(){
document.getElementById("loginBox").classList.toggle("hidden")
}

function login(){
let pass=document.getElementById("password").value
if(pass===adminPassword){
document.getElementById("adminPanel").classList.remove("hidden")
alert("登入成功")
}else alert("錯誤")
}

async function addTask(){

let title=document.getElementById("title").value
let id=document.getElementById("id").value
let desc=document.getElementById("desc").value
let example=document.getElementById("example").value
let robux=document.getElementById("robux").value
let image=document.getElementById("image").files[0]

let reader=new FileReader()

reader.onload=async function(){

let newTask={
title,id,desc,example,robux,
image:reader.result||null
}

let newTasks=[...tasks]

if(window.editIndex!==undefined){
newTasks[window.editIndex]=newTask
window.editIndex=undefined
}else{
newTasks.push(newTask)
}

await updateTasks(newTasks)
loadTasks()
alert("完成")
}

if(image) reader.readAsDataURL(image)
else reader.onload()
}

function editTask(i){
let t=tasks[i]
document.getElementById("title").value=t.title
document.getElementById("id").value=t.id
document.getElementById("desc").value=t.desc
document.getElementById("example").value=t.example
document.getElementById("robux").value=t.robux
window.editIndex=i
alert("已進入編輯")
}

async function deleteTask(i){
if(!confirm("刪除？"))return
let newTasks=[...tasks]
newTasks.splice(i,1)
await updateTasks(newTasks)
loadTasks()
}

async function updateTasks(newTasks){

await fetch(`https://api.github.com/repos/${repo}/dispatches`,{
method:"POST",
headers:{
"Authorization":"Bearer 你的TOKEN",
"Accept":"application/vnd.github+json"
},
body:JSON.stringify({
event_type:"add-task",
client_payload:{taskList:newTasks}
})
})

}

function render(){
let html=""
tasks.forEach((t,i)=>{
html+=`
<div class="card">
<h3>${t.title}</h3>
<div>ID：${t.id}</div>
<div>${t.desc}</div>
<div>${t.example}</div>
<div class="robux">💰 ${t.robux}</div>
${t.image?`<img src="${t.image}">`:``}

<button onclick="editTask(${i})">✏ 編輯</button>
<button onclick="deleteTask(${i})">🗑 刪除</button>
</div>`
})
document.getElementById("tasks").innerHTML=html
}

function searchTask(){
let v=document.querySelector(".search").value.toLowerCase()
let f=tasks.filter(t=>t.title.toLowerCase().includes(v)||t.id.toLowerCase().includes(v))
let html=""
f.forEach((t,i)=>{
html+=`<div class="card">
<h3>${t.title}</h3>
<div>ID：${t.id}</div>
<div>${t.desc}</div>
<div>${t.example}</div>
<div class="robux">💰 ${t.robux}</div>
${t.image?`<img src="${t.image}">`:``}
</div>`
})
document.getElementById("tasks").innerHTML=html
}

loadTasks()

</script>

</body>
</html>
